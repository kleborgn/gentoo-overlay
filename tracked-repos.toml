[[packages]]
github = "aunetx/deezer-linux"
category = "media-sound"
name = "deezer"
build_system = "prebuilt"
description = "Deezer music streaming service - Linux port (Electron app)"
license = "all-rights-reserved"
keywords = "-* ~amd64 ~arm64"
restrict = "bindist mirror strip"
qa_prebuilt = "opt/deezer/*"
install_path = "opt/deezer"
eclasses = ["desktop", "xdg"]
rdepend = [
    "dev-libs/atk",
    "dev-libs/expat",
    "dev-libs/glib:2",
    "dev-libs/nspr",
    "dev-libs/nss",
    "media-libs/alsa-lib",
    "media-libs/mesa",
    "net-print/cups",
    "x11-libs/cairo",
    "x11-libs/gtk+:3",
    "x11-libs/libX11",
    "x11-libs/libXcomposite",
    "x11-libs/libXdamage",
    "x11-libs/libXext",
    "x11-libs/libXfixes",
    "x11-libs/libXrandr",
    "x11-libs/libxcb",
    "x11-libs/pango",
]

[[packages.arch_assets]]
arch = "amd64"
filename = "deezer-desktop-{PV}-x64.tar.xz"

[[packages.arch_assets]]
arch = "arm64"
filename = "deezer-desktop-{PV}-arm64.tar.xz"
