# tracked-repos.toml
# List GitHub repositories to track for new releases.
# Run `python scripts/track-releases.py` locally, or let GitHub Actions do it daily.
#
# Required fields per package:
#   github       = "owner/repo"
#   category     = "dev-util"          # Gentoo category
#   build_system = "cargo"             # cargo | cmake | meson | autotools | python-pep517 | prebuilt
#   description  = "Short description"
#   license      = "MIT"              # SPDX license expression
#
# Optional fields (all build systems):
#   name         = "mypackage"         # defaults to the repo name
#   tag_prefix   = "v"                 # prefix stripped to get version, default "v"
#   slot         = "0"                 # default "0"
#   homepage     = "https://..."       # defaults to GitHub URL
#
# Extra fields for build_system = "prebuilt":
#   keywords     = "-* ~amd64 ~arm64"  # KEYWORDS value
#   restrict     = "bindist mirror strip"
#   qa_prebuilt  = "opt/mypkg/*"
#   install_path = "opt/mypkg"         # used in skeleton src_install comment
#   eclasses     = ["desktop", "xdg"]
#   rdepend      = ["dev-libs/glib:2", ...]
#
#   [[packages.arch_assets]]           # one block per arch; filename uses {PV} as placeholder
#   arch     = "amd64"
#   filename = "mypkg-{PV}-x64.tar.xz"
#
#   [[packages.arch_assets]]
#   arch     = "arm64"
#   filename = "mypkg-{PV}-arm64.tar.xz"
#
# How prebuilt versioning works:
#   - When a new release is detected and an ebuild already exists for a prior version,
#     the script copies it verbatim to the new version filename.  No content changes
#     are needed because everything version-specific is expressed via ${PV} in the ebuild.
#   - On the very first run (no existing ebuild) a skeleton is generated from the
#     prebuilt template.  You must implement src_install() before it can be installed.

